name: Playwright Tests

on:
  push:
    branches: [main, feature/*, bugfix/*]
  pull_request:
    branches: [main]

jobs:
  test:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: true
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          DYNAMICS_BASE_URL: ${{ secrets.DYNAMICS_BASE_URL }}
          DYNAMICS_APP_ID: ${{ secrets.DYNAMICS_APP_ID }}
          LOGIN_EMAIL: ${{ secrets.LOGIN_EMAIL }}
          CHURCH_USERNAME: ${{ secrets.CHURCH_USERNAME }}
          CHURCH_PASSWORD: ${{ secrets.CHURCH_PASSWORD }}
    

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results (screenshots, videos, traces)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 14
