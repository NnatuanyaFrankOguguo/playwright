# azure-pipelines.yml

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

parameters:
  - name: runMode
    displayName: 'Run Mode'
    type: string
    default: 'auto'
    values:
      - auto
      - all
      - suite
      - tag

  - name: testSuite
    displayName: 'Test Suite - folder (only used when Run Mode = suite)'
    type: string
    default: 'none'
    values:
      - none
      - auth
      - dashboard
      - portuguese
      # Add more folders as you create them

  - name: testTag
    displayName: 'Test Tag (only used when Run Mode = tag)'
    type: string
    default: 'none'
    values:
      - none
      - '@smoke'
      - '@auth'
      - '@dashboard'
      - '@portuguese'
      - '@regression'
      # Add more tags as you create them

pool:
  name: 'my-local-agent'

variables:
  NODE_VERSION: '18.x'

stages:
  - stage: Test
    displayName: 'Playwright Tests'
    jobs:
      - job: RunTests
        displayName: 'Run Playwright Tests'
        timeoutInMinutes: 60

        steps:
          # Step 1 - Setup Node.js
          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: $(NODE_VERSION)

          # Step 2 - Install dependencies
          - script: npm ci
            displayName: 'Install npm dependencies'

          # Step 3 - Install Playwright browsers
          - script: npx playwright install --with-deps
            displayName: 'Install Playwright browsers'

          # Step 4 - Detect changed test files (only in auto mode)
          #- ${{ if eq(parameters.runMode, 'auto') }}:
          #  - checkout: self
          #    fetchDepth: 0
          #    displayName: 'Fetch full git history'


          # ---- ALL MODE: Run everything ----
          - ${{ if eq(parameters.runMode, 'all') }}:
            - script: npx playwright test
              displayName: 'Run All Tests'
              continueOnError: true
              env:
                CHURCH_PASSWORD: $(CHURCH_PASSWORD)
                CHURCH_USERNAME: $(CHURCH_USERNAME)

          # ---- SUITE MODE: Run by folder ----
          - ${{ if eq(parameters.runMode, 'suite') }}:
            - script: npx playwright test tests\${{ parameters.testSuite }}
              displayName: 'Run ${{ parameters.testSuite }} suite'
              continueOnError: true
              env:
                CHURCH_PASSWORD: $(CHURCH_PASSWORD)
                CHURCH_USERNAME: $(CHURCH_USERNAME)

          # ---- TAG MODE: Run by tag ----
          - ${{ if eq(parameters.runMode, 'tag') }}:
            - script: npx playwright test --grep "${{ parameters.testTag }}"
              displayName: 'Run tests tagged ${{ parameters.testTag }}'
              continueOnError: true
              env:
                CHURCH_PASSWORD: $(CHURCH_PASSWORD)
                CHURCH_USERNAME: $(CHURCH_USERNAME)

          # Step 5 - Publish JUnit test results
          - task: PublishTestResults@2
            displayName: 'Publish Test Results'
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'test-results/results.xml'
              testRunTitle: 'Playwright Test Results'
            condition: always()

          # Step 6 - Publish HTML report
          - task: PublishPipelineArtifact@1
            displayName: 'Publish Playwright HTML Report'
            inputs:
              targetPath: 'playwright-report'
              artifact: 'playwright-report'
              publishLocation: 'pipeline'
            condition: always()

          # Step 7 - Publish videos/screenshots
          - task: PublishPipelineArtifact@1
            displayName: 'Publish Test Attachments'
            inputs:
              targetPath: 'test-results'
              artifact: 'test-attachments'
              publishLocation: 'pipeline'
            condition: always()