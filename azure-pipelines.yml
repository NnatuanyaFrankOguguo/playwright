# azure-pipelines.yml

trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

parameters:
  - name: runMode
    displayName: 'Run Mode'
    type: string
    default: 'auto'
    values:
      - auto
      - all
      - suite
      - tag

  - name: testSuite
    displayName: 'Test Suite - folder (only used when Run Mode = suite)'
    type: string
    default: 'none'
    values:
      - none
      - auth
      - dashboard
      - portuguese
      # Add more folders as you create them

  - name: testTag
    displayName: 'Test Tag (only used when Run Mode = tag)'
    type: string
    default: 'none'
    values:
      - none
      - '@smoke'
      - '@auth'
      - '@dashboard'
      - '@portuguese'
      - '@regression'
      # Add more tags as you create them

pool:
  name: 'my-local-agent'

variables:
  NODE_VERSION: '18.x'

stages:
  - stage: Test
    displayName: 'Playwright Tests'
    jobs:
      - job: RunTests
        displayName: 'Run Playwright Tests'
        timeoutInMinutes: 60

        steps:
          # Step 1 - Setup Node.js
          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: $(NODE_VERSION)

          # Step 2 - Install dependencies
          - script: npm ci
            displayName: 'Install npm dependencies'

          # Step 3 - Install Playwright browsers
          - script: npx playwright install --with-deps
            displayName: 'Install Playwright browsers'

          # Step 4 - Detect changed test files (only in auto mode)
          - ${{ if eq(parameters.runMode, 'auto') }}:
            - checkout: self
              fetchDepth: 0
              displayName: 'Fetch full git history'

          - ${{ if eq(parameters.runMode, 'auto') }}:
            - powershell: |
                $ErrorActionPreference = "Continue"
                
                # Try comparing with previous commit first
                $changedFiles = $null
                
                try {
                  # Get the list of commits to see if HEAD~1 exists
                  $commitCount = git rev-list --count HEAD 2>$null
                  
                  if ($commitCount -gt 1) {
                    $changedFiles = git diff --name-only HEAD~1 HEAD
                    Write-Host "Compared with previous commit (HEAD~1)"
                  } else {
                    # First commit in repo, list all files
                    $changedFiles = git ls-tree -r --name-only HEAD
                    Write-Host "First commit detected, listing all files"
                  }
                } catch {
                  Write-Host "Git diff failed, trying alternative method..."
                  
                  # Fallback: compare with origin/main
                  try {
                    git fetch origin main 2>$null
                    $changedFiles = git diff --name-only origin/main HEAD
                    Write-Host "Compared with origin/main"
                  } catch {
                    Write-Host "All detection methods failed."
                  }
                }

                if ($changedFiles) {
                  # Filter for only test files
                  $testFiles = $changedFiles | Where-Object { $_ -match '\.spec\.(ts|js)$' }

                  if ($testFiles) {
                    $fileList = ($testFiles -join ' ')
                    Write-Host "Changed test files found:"
                    Write-Host $fileList
                    Write-Host "##vso[task.setvariable variable=TEST_FILES]$fileList"
                    Write-Host "##vso[task.setvariable variable=HAS_TEST_CHANGES]true"
                  } else {
                    Write-Host "Files were changed but none are test files."
                    Write-Host "##vso[task.setvariable variable=HAS_TEST_CHANGES]false"
                  }
                } else {
                  Write-Host "Could not detect changes. Falling back to run all tests."
                  Write-Host "##vso[task.setvariable variable=HAS_TEST_CHANGES]fallback"
                }
              displayName: 'Detect changed test files'

          # ---- AUTO MODE: Run only changed test files ----
          - ${{ if eq(parameters.runMode, 'auto') }}:
            - script: npx playwright test $(TEST_FILES)
              displayName: 'Run changed tests only'
              condition: eq(variables.HAS_TEST_CHANGES, 'true')
              continueOnError: true
              env:
                CHURCH_PASSWORD: $(CHURCH_PASSWORD)
                CHURCH_USERNAME: $(CHURCH_USERNAME)

          # ---- AUTO MODE: Fallback - run all tests if detection failed ----
          - ${{ if eq(parameters.runMode, 'auto') }}:
            - script: npx playwright test
              displayName: 'Run all tests (fallback)'
              condition: eq(variables.HAS_TEST_CHANGES, 'fallback')
              continueOnError: true
              env:
                CHURCH_PASSWORD: $(CHURCH_PASSWORD)
                CHURCH_USERNAME: $(CHURCH_USERNAME)

          - ${{ if eq(parameters.runMode, 'auto') }}:
            - powershell: |
                Write-Host "No test files were modified. Skipping test run."
                Write-Host "If you want to run all tests, use Run Pipeline manually and set Run Mode to 'all'."
              displayName: 'Skip - no test changes detected'
              condition: eq(variables.HAS_TEST_CHANGES, 'false')

          # ---- ALL MODE: Run everything ----
          - ${{ if eq(parameters.runMode, 'all') }}:
            - script: npx playwright test
              displayName: 'Run All Tests'
              continueOnError: true
              env:
                CHURCH_PASSWORD: $(CHURCH_PASSWORD)
                CHURCH_USERNAME: $(CHURCH_USERNAME)

          # ---- SUITE MODE: Run by folder ----
          - ${{ if eq(parameters.runMode, 'suite') }}:
            - script: npx playwright test ${{ parameters.testSuite }}
              displayName: 'Run ${{ parameters.testSuite }} suite'
              continueOnError: true
              env:
                CHURCH_PASSWORD: $(CHURCH_PASSWORD)
                CHURCH_USERNAME: $(CHURCH_USERNAME)

          # ---- TAG MODE: Run by tag ----
          - ${{ if eq(parameters.runMode, 'tag') }}:
            - script: npx playwright test --grep "${{ parameters.testTag }}"
              displayName: 'Run tests tagged ${{ parameters.testTag }}'
              continueOnError: true
              env:
                CHURCH_PASSWORD: $(CHURCH_PASSWORD)
                CHURCH_USERNAME: $(CHURCH_USERNAME)

          # Step 5 - Publish JUnit test results
          - task: PublishTestResults@2
            displayName: 'Publish Test Results'
            inputs:
              testResultsFormat: 'JUnit'
              testResultsFiles: 'test-results/results.xml'
              testRunTitle: 'Playwright Test Results'
            condition: always()

          # Step 6 - Publish HTML report
          - task: PublishPipelineArtifact@1
            displayName: 'Publish Playwright HTML Report'
            inputs:
              targetPath: 'playwright-report'
              artifact: 'playwright-report'
              publishLocation: 'pipeline'
            condition: always()

          # Step 7 - Publish videos/screenshots
          - task: PublishPipelineArtifact@1
            displayName: 'Publish Test Attachments'
            inputs:
              targetPath: 'test-results'
              artifact: 'test-attachments'
              publishLocation: 'pipeline'
            condition: always()